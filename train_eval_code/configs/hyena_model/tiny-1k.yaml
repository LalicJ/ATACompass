_target_: models.hyena.sequence.dna_embedding.DNAEmbeddingModel
d_model: 128
n_layer: 2
d_inner: ${eval:4 * ${.d_model}}
vocab_size: 12
resid_dropout: 0.0
embed_dropout: 0.1

fused_mlp: False # figure out how to use fused MLP, maybe only with bf16 + a100
fused_dropout_add_ln: False
pad_vocab_size_multiple: 8
residual_in_fp32: True
layer:
  _name_: hyena
  emb_dim: 5
  filter_order: 64
  short_filter_order: 3
  l_max: 1026
  modulate: True
  w: 10
  lr: 6e-4
  wd: 0.0
  lr_pos_emb: 0.0
